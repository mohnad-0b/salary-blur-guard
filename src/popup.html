<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <title>Salary Blur Guard</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="head">
    <div class="brand">
      <img class="mark" src="icons/icon48.png" alt="" width="18" height="18" />
      <h1>Salary Blur Guard</h1>
    </div>
    <label class="switch" title="Blur amounts">
      <input type="checkbox" id="enabled" />
      <span class="slider"></span>
    </label>
  </header>

  <p class="status" id="status">Checking this site…</p>

  <section class="block">
    <div class="block-head">
      <h2>Sites</h2>
      <select id="scope" aria-label="Where to run">
        <option value="listed">Listed sites only</option>
        <option value="all">Every site</option>
      </select>
    </div>

    <div id="siteControls">
      <div class="add-row">
        <input type="text" id="siteInput" placeholder="example.com" spellcheck="false" />
        <button id="addSite" class="btn">Add</button>
      </div>
      <button id="addCurrentSite" class="btn btn-ghost btn-wide">Add this site</button>
      <ul class="list" id="siteList"></ul>
    </div>
  </section>

  <section class="block">
    <div class="block-head">
      <h2>Currencies</h2>
      <span class="count" id="currencyCount"></span>
    </div>
    <div class="add-row">
      <input type="text" id="currencyInput" placeholder="USD, $, JOD…" spellcheck="false" />
      <button id="addCurrency" class="btn">Add</button>
    </div>
    <div class="chips" id="currencyList"></div>
  </section>

  <footer class="foot">
    <button id="reset" class="btn btn-ghost btn-wide">Restore defaults</button>
  </footer>

  <script src="defaults.js"></script>
  <script src="popup.js"></script>
</body>
</html>
